<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 200px;
            padding: 10px;
            font-family: sans-serif;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button:hover {
            background: #218838;
        }

        .options-link {
            font-size: 12px;
            text-decoration: none;
            color: #007bff;
        }

        #error {
            color: red;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <button id="fillBtn">Autofill Form</button>
    <a href="#" id="openOptions" class="options-link">Configure Settings</a>
    <div id="error"></div>
    <script src="popup.js"></script>
</body>

</html>

<!DOCTYPE html>
<html>
<head>
  <title>AutoForm Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input[type="text"], input[type="password"], textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    textarea { height: 300px; }
    button { margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h1>AutoForm Configuration</h1>
  
  <label for="apiKey">Gemini API Key</label>
  <input type="password" id="apiKey" placeholder="Get from: https://aistudio.google.com/app/apikey" />
  
  <label for="profile">Your Profile & Reference Material</label>
  <textarea id="profile" placeholder="Paste your personal info (name, email, student ID, etc.) AND any reference material (lecture notes, study guides, etc.) that should be used to answer form questions..."></textarea>
  
  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
